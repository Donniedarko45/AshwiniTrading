# ===================================================
# TEMPORARY nginx config for ashwinitradingacademy.com
# ===================================================
# HTTP-only config used ONLY during initial SSL certificate
# issuance via Certbot. After certs are obtained, this file
# is replaced by ashwinitradingacademy.conf (full SSL).
# ===================================================

server {
    listen 80;
    server_name ashwinitradingacademy.com www.ashwinitradingacademy.com;

    # Serve ACME challenge for Certbot certificate issuance
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Return 503 for all other requests (site not ready yet)
    location / {
        return 503;
    }
}
