# ===================================================
# Nginx config for ashwinitradingacademy.com
# ===================================================
# This file is placed in the FIRST app's nginx conf.d/ directory.
# It routes traffic for ashwinitradingacademy.com to the
# ashwini-trading-app container via the shared-proxy network.
# ===================================================

# Redirect HTTP → HTTPS (+ serve ACME challenge for cert renewal)
server {
    listen 80;
    server_name ashwinitradingacademy.com www.ashwinitradingacademy.com;

    # Let's Encrypt ACME challenge — MUST be before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main site — ashwinitradingacademy.com (HTTPS)
server {
    listen 443 ssl;
    http2 on;
    server_name ashwinitradingacademy.com;

    ssl_certificate     /etc/letsencrypt/live/ashwinitradingacademy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ashwinitradingacademy.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_TRADING:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy all traffic to the Express app container
    # Express serves both /api/* (backend) and static files (frontend)
    location / {
        proxy_pass http://ashwini-trading-app:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout settings for payment webhooks (may take longer)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Cache static assets served by Express
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        proxy_pass http://ashwini-trading-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# Redirect www → non-www
server {
    listen 443 ssl;
    http2 on;
    server_name www.ashwinitradingacademy.com;

    ssl_certificate     /etc/letsencrypt/live/ashwinitradingacademy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ashwinitradingacademy.com/privkey.pem;

    return 301 https://ashwinitradingacademy.com$request_uri;
}
